<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AnimeEgdey</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="https://icons8.com/icon/MTivAq0U9TSN/anime">

<!-- FONT (simple clean font, not cursive) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:"Montserrat",sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    overflow:hidden;

    color:white;

    background:#000;
}

/* BACKGROUND GIF */
.bg-gif{
    position:fixed;
    inset:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-3;
}

/* DARK OVERLAY */
.overlay{
    position:fixed;
    inset:0;

    background:rgba(0,0,0,0.65);

    z-index:-2;
}

/* LOGIN BOX */
.login-box{
    width:min(420px,92%);

    background:rgba(10,10,10,0.55);

    border:1px solid rgba(255,255,255,0.12);

    backdrop-filter:blur(18px);

    border-radius:26px;

    padding:42px 34px;
}

/* HEADER */
.logo{
    text-align:center;

    font-size:2rem;

    font-weight:700;

    margin-bottom:10px;
}

/* SUBTEXT */
.subtitle{
    text-align:center;

    color:#d0d0d0;

    font-size:0.95rem;

    margin-bottom:30px;
}

/* GREEN TEXT STYLE (Dekus eye vibe) */
.green{
    color:#3cff7a;
}

/* INPUT GROUP */
.input-group{
    margin-bottom:18px;
}

.input-label{
    display:block;

    margin-bottom:8px;

    font-size:0.9rem;

    color:#3cff7a; /* GREEN TEXT */
}

/* INPUT */
.input-field{
    width:100%;

    padding:14px 16px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.10);

    outline:none;

    background:rgba(255,255,255,0.06);

    color:white;

    transition:0.3s;
}

.input-field:focus{
    border:1px solid #3cff7a;
}

/* OPTIONS */
.options{
    display:flex;
    justify-content:space-between;
    align-items:center;

    margin-bottom:25px;

    font-size:0.85rem;
}

.options label{
    color:#3cff7a; /* GREEN */
}

.options a{
    color:#3cff7a;

    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

/* BUTTON */
.login-btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:18px;

    background:rgba(255,255,255,0.10);

    color:white;

    font-weight:600;

    cursor:pointer;

    transition:0.3s;
}

.login-btn:hover{
    background:rgba(255,255,255,0.18);
}

/* SUCCESS SCREEN */
.success-screen{
    position:fixed;
    inset:0;

    display:none;
}

.success-screen img{
    width:100%;
    height:100%;

    object-fit:cover;
}

</style>
</head>

<body>

<!-- BACKGROUND GIF -->
<img class="bg-gif"
src="https://i.pinimg.com/originals/67/d8/f4/67d8f4d02ba48436f80d6cf9a82060c2.gif"
alt="bg">

<div class="overlay"></div>

<!-- LOGIN -->
<div class="login-box" id="loginBox">

    <div class="logo">
        AnimeEgdey
    </div>

    <p class="subtitle">
        Destroy your enemies and bring them hell
    </p>

    <!-- EMAIL -->
    <div class="input-group">

        <label class="input-label green">
            Email
        </label>

        <input type="text" id="email" class="input-field" placeholder="Enter email">

    </div>

    <!-- PASSWORD -->
    <div class="input-group">

        <label class="input-label green">
            Password
        </label>

        <input type="password" id="password" class="input-field" placeholder="Enter password">

    </div>

    <!-- OPTIONS -->
    <div class="options">

        <label>
            <input type="checkbox">
            Remember me
        </label>

        <a href="#">Forgot Password?</a>

    </div>

    <button class="login-btn" onclick="login()">
        Login
    </button>

</div>

<!-- SUCCESS IMAGE SCREEN -->
<div class="success-screen" id="successScreen">
    <img src="https://i.pinimg.com/736x/44/07/91/44079103a2a31cdb1e07bbc42c1a4171.jpg">
</div>

<script>

function login(){

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    if(email === "Eugene" && password === "GwapoKO"){

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("successScreen").style.display = "block";

    }else{

        alert("Wrong credentials!");

    }

}

</script>

</body>
</html>
