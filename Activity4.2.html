<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AniFunk</title>

<!-- FAVICON -->
<link rel="icon" type="image/png" href="https://img.icons8.com/pulsar-line/48/anime.png">

<!-- GOOGLE FONT -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* BODY */
body{
    font-family:'Poppins',sans-serif;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    overflow:hidden;

    background:
    linear-gradient(
        rgba(0,0,0,0.88),
        rgba(0,0,0,0.95)
    ),

    url("https://cdn.shopify.com/s/files/1/0568/2298/8958/files/black_deku_tranformation.jpg?v=1731778053");

    background-size:cover;
    background-position:center;

    color:white;

    position:relative;
}

/* DARK GLOW */
body::before{
    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at top,
        rgba(255,255,255,0.05),
        transparent 40%
    );

    pointer-events:none;
}

/* CONTAINER */
.container{
    width:90%;
    max-width:850px;

    background:rgba(15,15,15,0.78);

    border-radius:22px;

    padding:22px;

    backdrop-filter:blur(6px);

    border:1px solid rgba(255,255,255,0.08);

    z-index:2;
}

/* HEADER */
.header{
    text-align:center;

    margin-bottom:20px;
}

.header h1{
    font-size:45px;

    letter-spacing:2px;

    margin-bottom:8px;
}

.header p{
    color:#bbbbbb;

    font-size:15px;
}

/* IMAGE BOX */
.image-box{
    width:100%;

    overflow:hidden;

    border-radius:18px;

    margin-bottom:20px;

    border:1px solid rgba(255,255,255,0.08);
}

/* IMAGE */
.image-box img{
    width:100%;

    display:block;

    object-fit:cover;

    aspect-ratio:16/9;
}

/* PLAYER */
.player{
    background:rgba(255,255,255,0.04);

    padding:14px;

    border-radius:16px;

    border:1px solid rgba(255,255,255,0.05);
}

/* SOUNDCLOUD */
iframe{
    width:100%;

    height:170px;

    border:none;

    border-radius:12px;
}

/* SMALL DOTS */
.dot{
    position:absolute;

    width:5px;
    height:5px;

    border-radius:50%;

    background:white;

    opacity:0.3;
}

.dot1{
    top:12%;
    left:14%;
}

.dot2{
    top:20%;
    right:18%;
}

.dot3{
    bottom:18%;
    left:20%;
}

.dot4{
    bottom:14%;
    right:24%;
}

</style>
</head>

<body>

<!-- DECORATIVE DOTS -->
<div class="dot dot1"></div>
<div class="dot dot2"></div>
<div class="dot dot3"></div>
<div class="dot dot4"></div>

<!-- MAIN CONTAINER -->
<div class="container">

    <!-- HEADER -->
    <div class="header">

        <h1>AniFunk</h1>

        <p>
            Dark anime vibes and phonk atmosphere
        </p>

    </div>

    <!-- ANIME IMAGE -->
    <div class="image-box">

        <img
        src="https://cdn.shopify.com/s/files/1/0568/2298/8958/files/black_deku_tranformation.jpg?v=1731778053"
        alt="Dark Deku">

    </div>

    <!-- MUSIC PLAYER -->
    <div class="player">

        <iframe
        scrolling="no"
        allow="autoplay"
        src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fvlx-991029074/adversario-forte&color=%23000000&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false">
        </iframe>

    </div>

</div>

</body>
</html>
