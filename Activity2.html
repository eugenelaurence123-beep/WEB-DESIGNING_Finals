<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Famous Website's Buttons</title>

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

/* BODY */
body{
    height:100vh;

    background:#f0f0f0;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */
.container{
    width:950px;

    background:white;

    padding:40px;

    border-radius:10px;
}

/* HEADER */
.container h1{
    font-size:48px;
    color:#222;
    margin-bottom:10px;
}

/* TEXT */
.container p{
    font-size:18px;
    color:#666;
    margin-bottom:30px;
}

/* ROWS */
.top-row{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}

.middle-row{
    width:48%;
    margin-bottom:20px;
}

.bottom-row{
    width:100%;
}

/* BOX */
.box{
    flex:1;

    background:#e5e5e5;

    padding:20px;

    border-radius:6px;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ========================= */
/* BUTTONS */
/* ========================= */

/* BLACK BUTTON */
.black-btn{
    background:black;
    color:white;

    border:none;

    width:160px;
    height:55px;

    font-size:20px;

    cursor:pointer;
}

/* YELLOW BUTTON */
.yellow-btn{
    background:#ffd814;
    color:black;

    border:none;

    width:350px;
    height:70px;

    border-radius:35px;

    font-size:22px;

    cursor:pointer;
}

/* GREEN BUTTON */
.green-btn{
    background:#2ea44f;
    color:white;

    border:none;

    width:170px;
    height:55px;

    border-radius:8px;

    font-size:22px;
    font-weight:bold;

    cursor:pointer;
}

/* PURPLE BUTTON */
.purple-btn{
    background:#7952b3;
    color:white;

    border:none;

    padding:15px 35px;

    border-radius:8px;

    font-size:20px;
    font-weight:bold;

    margin-right:10px;

    cursor:pointer;
}

/* LIGHT BUTTON */
.light-btn{
    background:#f8f8f8;
    color:#555;

    border:1px solid #ccc;

    padding:15px 35px;

    border-radius:8px;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}

/* BLUE BUTTON */
.blue-btn{
    background:#0a66c2;
    color:white;

    border:none;

    padding:18px 160px;

    border-radius:35px;

    font-size:20px;
    font-weight:bold;

    margin-right:15px;

    cursor:pointer;
}

/* OUTLINE BUTTON */
.outline-btn{
    background:white;
    color:#0a66c2;

    border:2px solid #0a66c2;

    padding:16px 45px;

    border-radius:35px;

    font-size:20px;
    font-weight:bold;

    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

    <h1>Famous Website's Button</h1>

    <p>
        Simple button styles inspired by popular websites
    </p>

    <!-- TOP ROW -->
    <div class="top-row">

        <div class="box">
            <button class="black-btn">
                Request Now
            </button>
        </div>

        <div class="box">
            <button class="yellow-btn">
                Add to Cart
            </button>
        </div>

        <div class="box">
            <button class="green-btn">
                Sign Up
            </button>
        </div>

    </div>

    <!-- MIDDLE ROW -->
    <div class="middle-row box">

        <button class="purple-btn">
            Get Started
        </button>

        <button class="light-btn">
            Download
        </button>

    </div>

    <!-- BOTTOM ROW -->
    <div class="bottom-row box">

        <button class="blue-btn">
            Apply on Website
        </button>

        <button class="outline-btn">
            Save
        </button>

    </div>

</div>

</body>
</html>
